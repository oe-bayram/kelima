appId: com.anonymous.kelima
---
# Lernsession aus einem Kapitel starten, Karte aufdecken, bewerten.
# Voraussetzung: Kapitel mit Wörtern.
- runFlow: login.yaml
- tapOn: 'Kapitel'
- tapOn:
    id: 'chapter-row'
    index: 0
- tapOn: 'Session starten'
# Start-Sheet (Anzahl + Lernen/Testen)
- assertVisible: 'Lernen'
- tapOn: 'Lernen'
# Hide/Reveal-Karte
- assertVisible: 'Anzeigen'
- tapOn: 'Alles anzeigen'
# Bewerten → nächste Karte (oder Zusammenfassung bei nur einer Karte)
- tapOn: 'Kann ich'
